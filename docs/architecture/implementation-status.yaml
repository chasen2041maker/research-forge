schema_version: 1
generated_for: Research Forge v0.1
rules:
  implemented: Code and automated checks exist for the stated scope.
  partial: The design exists, but important documented behavior is absent or limited.
  planned: No shipped implementation claim is made.
capabilities:
  application_centric_hexagonal_architecture:
    status: implemented
    evidence: backend/tests/research_forge/test_architecture.py
  postgres_mission_source_of_truth:
    status: implemented
    evidence: backend/tests/research_forge/test_postgres_source_of_truth.py
  operation_ledger_and_stale_redelivery:
    status: partial
    implemented: Reconciler scans stale Operations and emits an Outbox redelivery.
    absent: It does not discover orphan CAS bytes, existing Git commits, or missing database references.
  worker_lease_and_cancellation:
    status: partial
    implemented: Mission, Task, Attempt, Operation, and Approval use persisted compare-and-swap versions; Attempt also has leases, heartbeats, and cancellation paths.
    absent: The reconciler does not yet inventory every cross-store orphan such as CAS bytes or pre-existing Git commits.
  sandbox_broker_recovery:
    status: implemented
    evidence: backend/tests/research_forge/test_completed_result_store.py
    implemented: The broker supplements its bounded in-process cache with one atomically persisted, checksummed completion record per operation and reloads it after restart.
  reproduction_spec_v1:
    status: implemented
    evidence: docs/contracts/reproduction-spec-v1.schema.json
  runtime_capability_profile:
    status: partial
    implemented: Current subset is documented in runtime-capability-profile-v0.1.md.
    absent: Schema allowances are broader than VS-001 runtime behavior.
  redis_attempt_transport:
    status: implemented
    evidence: backend/tests/research_forge/test_redis_queue.py and backend/tests/research_forge/test_redis_streams_integration.py
    implemented: Versioned Redis Stream envelopes route baseline and repair Attempts separately; consumer groups recover expired pending entries and atomically dead-letter exhausted deliveries.
  bounded_repair_decision_and_patch_binding:
    status: implemented
    evidence: backend/tests/research_forge/test_repair_flow.py
    implemented: The decision port receives verified baseline log, allowed paths, and change budgets only; its unified diff is persisted as a CAS PATCH artifact, and approval binds that exact artifact hash before candidate execution.
    absent: The shipped production composition deliberately has no configured LLM provider or repair worker process.
  studio_forge_contract_boundary:
