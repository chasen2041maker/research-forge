name: Research Forge gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  architecture-and-vs001:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install alembic fastapi httpx jsonschema pytest ruff sqlalchemy
      - run: python -m pytest backend/tests/research_forge -q -m 'not docker'
      - run: python -m ruff check backend/research_forge backend/tests/research_forge

  docker-vs001-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install jsonschema pytest sqlalchemy
      - run: docker info
      - run: python -m pytest backend/tests/research_forge/test_docker_e2e.py -q -m docker

  frozen-evaluation:
    runs-on: ubuntu-latest
    needs: [architecture-and-vs001, docker-vs001-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install alembic fastapi httpx jsonschema pytest ruff sqlalchemy
      - run: python backend/scripts/run_frozen_research_forge_eval.py --output-dir artifacts/eval-reports
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: research-forge-frozen-evaluation
          path: artifacts/eval-reports/*.json
          if-no-files-found: error
