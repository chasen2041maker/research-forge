name: Research Forge gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  architecture-and-vs001:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install alembic fastapi httpx jsonschema mypy pytest ruff sqlalchemy
      - run: python -m mypy backend/research_forge --follow-imports=skip --ignore-missing-imports --check-untyped-defs --warn-unused-ignores
      - run: python -m pytest backend/tests/research_forge -q -m 'not docker'
      - run: python -m ruff check backend/research_forge backend/tests/research_forge

  docker-vs001-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install jsonschema pytest sqlalchemy
      - run: docker info
      - run: python -m pytest backend/tests/research_forge/test_docker_e2e.py -q -m docker

  postgres-source-of-truth:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: research_forge
          POSTGRES_USER: research_forge
          POSTGRES_PASSWORD: research_forge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U research_forge -d research_forge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install alembic psycopg2-binary pytest sqlalchemy
      - run: python -m pytest backend/tests/research_forge/test_postgres_source_of_truth.py -q -m postgres
        env:
          RF_TEST_POSTGRES_URL: postgresql+psycopg2://research_forge:research_forge@127.0.0.1:5432/research_forge

  frozen-evaluation:
    runs-on: ubuntu-latest
    needs: [architecture-and-vs001, docker-vs001-gate, postgres-source-of-truth]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install alembic fastapi httpx jsonschema pytest ruff sqlalchemy
      - run: python backend/scripts/run_frozen_research_forge_eval.py --output-dir artifacts/eval-reports
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: research-forge-frozen-evaluation
          path: artifacts/eval-reports/*.json
          if-no-files-found: error
